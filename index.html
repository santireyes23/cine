<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>¿Vamos al cine? 🎬</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #0d2b1f, #1a4a35, #0f3826);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    #app {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem 1rem;
      width: 100%;
    }

    .screen { display: none; width: 100%; max-width: 420px; flex-direction: column; align-items: center; gap: 1.25rem; }
    .screen.active { display: flex; }

    .card {
      background: #fff;
      border: 2px solid #2ecc71;
      border-radius: 20px;
      padding: 2rem 1.75rem;
      width: 100%;
      text-align: center;
      box-shadow: 0 4px 24px rgba(212,83,126,0.08);
    }

    .emoji-big { font-size: 56px; line-height: 1; margin-bottom: 0.5rem; display: block; }

    .title {
      font-size: 22px;
      font-weight: 600;
      color: #2c2c2a;
      line-height: 1.3;
      margin-bottom: 0.5rem;
    }

    .subtitle {
      font-size: 15px;
      color: #888780;
      line-height: 1.6;
    }

    .btn-yes {
      background: #1a7a4a;
      color: #fff;
      border: none;
      border-radius: 12px;
      padding: 0.75rem 2.5rem;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.15s, background 0.15s;
      font-family: inherit;
    }
    .btn-yes:hover { background: #145c37; transform: scale(1.04); }
    .btn-yes:active { transform: scale(0.97); }

    .btn-no {
      background: transparent;
      color: #888780;
      border: 1px solid #ddd;
      border-radius: 12px;
      padding: 0.65rem 1.75rem;
      font-size: 14px;
      cursor: pointer;
      font-family: inherit;
      position: absolute;
      transition: font-size 0.3s;
      white-space: nowrap;
    }

    #no-container {
      position: relative;
      width: 100%;
      height: 48px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .cal-grid {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 4px;
      width: 100%;
      margin-top: 0.75rem;
    }

    .cal-header {
      font-size: 11px;
      color: #aaa;
      text-align: center;
      padding: 4px 0;
      font-weight: 600;
    }

    .cal-day {
      aspect-ratio: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 13px;
      border-radius: 8px;
      cursor: pointer;
      color: #2c2c2a;
      border: 1px solid transparent;
      transition: background 0.15s, border-color 0.15s;
    }
    .cal-day:hover:not(.empty):not(.past) { background: #e8f8f0; border-color: #2ecc71; }
    .cal-day.past { color: #ccc; cursor: default; }
    .cal-day.empty { cursor: default; }
    .cal-day.selected { background: #1a7a4a; color: #fff; border-color: #1a7a4a; }

    .time-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
      width: 100%;
      margin-top: 0.5rem;
    }

    .time-btn {
      background: #e8f8f0;
      border: 2px solid #2ecc71;
      border-radius: 8px;
      padding: 0.6rem 0.25rem;
      font-size: 13px;
      cursor: pointer;
      color: #2c2c2a;
      font-family: inherit;
      transition: background 0.15s;
    }
    .time-btn:hover { background: #c5eed8; }
    .time-btn.selected { background: #a8e6c3; border-color: #1a7a4a; color: #0a3018; font-weight: 600; }

    .cal-nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      width: 100%;
      margin-bottom: 0.25rem;
    }
    .cal-nav button {
      background: none;
      border: none;
      cursor: pointer;
      font-size: 18px;
      color: #888;
      padding: 4px 8px;
      border-radius: 8px;
      font-family: inherit;
    }
    .cal-nav button:hover { background: #e8f8f0; }
    .cal-nav span { font-size: 14px; font-weight: 600; color: #2c2c2a; }

    .confirm-btn {
      width: 100%;
      background: #1a7a4a;
      color: #fff;
      border: none;
      border-radius: 12px;
      padding: 0.8rem;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      font-family: inherit;
      margin-top: 0.5rem;
      opacity: 0.4;
      pointer-events: none;
      transition: opacity 0.2s;
    }
    .confirm-btn.ready { opacity: 1; pointer-events: auto; }
    .confirm-btn.ready:hover { background: #145c37; }

    .tag {
      display: inline-block;
      background: #d4f5e2;
      color: #0d4a28;
      border-radius: 999px;
      font-size: 12px;
      padding: 3px 14px;
      font-weight: 600;
    }

    .chosen-info {
      background: #e8f8f0;
      border-radius: 10px;
      padding: 0.75rem 1rem;
      font-size: 14px;
      color: #555;
      width: 100%;
      text-align: center;
      line-height: 1.8;
      margin-top: 0.5rem;
    }
    .chosen-info strong { color: #2c2c2a; font-weight: 600; }
  </style>
</head>

      <p class="title">¿Quieres ir al cine conmigo? 🍿</p>
      <p class="subtitle">Tengo una propuesta irrechazable y tú eres la única con quien quiero compartirla 🩷</p>
    </div>
    <button class="btn-yes" onclick="goToCalendar()">¡Sí, quiero! 🎉</button>

      <button class="btn-no" id="noBtn" onmouseover="runAway()" ontouchstart="runAway(event)" onmousedown="runAway(event)">No gracias</button>
    </div>
  </div>

  <div id="screen2" class="screen">
    <div class="card">
      <span class="emoji-big">📅</span>
      <p class="title">¡Perfecto! ¿Qué día te queda bien?</p>
      <p class="subtitle" style="margin-bottom:1rem">Elige una fecha y luego la hora 🕐</p>

      <div class="cal-nav">
        <button onclick="changeMonth(-1)">‹</button>
        <span id="monthLabel"></span>
        <button onclick="changeMonth(1)">›</button>
      </div>

      <div class="cal-grid" id="calGrid"></div>

      <div id="timeSection" style="display:none; margin-top:1.25rem; text-align:left;">
        <p style="font-size:13px; color:#888; margin-bottom:0.5rem">Elige la hora 🎞️</p>
        <div class="time-grid" id="timeGrid"></div>
      </div>

      <button class="confirm-btn" id="confirmBtn" onclick="goToSuccess()">¡Confirmamos la cita! 🩷</button>
    </div>
  </div>

  <div id="screen3" class="screen">
    <div class="card">
      <span class="emoji-big">🥰</span>
      <p class="title">¡Ya tenemos plan!</p>
      <p class="subtitle" style="margin-bottom:1rem">No puedo esperar para verte ✨</p>
      <div class="chosen-info" id="chosenInfo"></div>
    </div>
    <span class="tag">¡Prepárate para la mejor cita! 🍿🎬</span>
  </div>
</div>

<script>
  const times = ["3:00 pm", "5:30 pm", "7:00 pm", "8:30 pm", "10:00 pm", "11:30 pm"];
  let selectedDate = null;
  let selectedTime = null;
  let noEscapes = 0;
  let currentMonth, currentYear;

  const months = ["enero","febrero","marzo","abril","mayo","junio","julio","agosto","septiembre","octubre","noviembre","diciembre"];
  const days = ["Do","Lu","Ma","Mi","Ju","Vi","Sá"];

  const today = new Date();
  currentMonth = today.getMonth();
  currentYear = today.getFullYear();

  function runAway(e) {
    if (e) e.preventDefault();
    const btn = document.getElementById('noBtn');
    const container = document.getElementById('no-container');
    const cw = container.offsetWidth;
    const bw = btn.offsetWidth;
    noEscapes++;
    const maxX = cw - bw;
    const x = Math.floor(Math.random() * maxX);
    btn.style.left = x + 'px';
    btn.style.transform = 'translateX(0)';
    const sz = Math.max(8, 14 - noEscapes);
    btn.style.fontSize = sz + 'px';
    btn.textContent = noEscapes > 5 ? 'jajaj no 😝' : noEscapes > 2 ? '¡para! 😤' : 'No gracias';
  }

  function goToCalendar() {
    document.getElementById('screen1').classList.remove('active');
    document.getElementById('screen2').classList.add('active');
    renderCalendar();
  }

  function renderCalendar() {
    document.getElementById('monthLabel').textContent = months[currentMonth] + ' ' + currentYear;
    const grid = document.getElementById('calGrid');
    grid.innerHTML = '';
    days.forEach(d => {
      const h = document.createElement('div');
      h.className = 'cal-header';
      h.textContent = d;
      grid.appendChild(h);
    });
    const first = new Date(currentYear, currentMonth, 1).getDay();
    const total = new Date(currentYear, currentMonth + 1, 0).getDate();
    for (let i = 0; i < first; i++) {
      const e = document.createElement('div');
      e.className = 'cal-day empty';
      grid.appendChild(e);
    }
    for (let d = 1; d <= total; d++) {
      const cell = document.createElement('div');
      cell.className = 'cal-day';
      cell.textContent = d;
      const cellDate = new Date(currentYear, currentMonth, d);
      const isPast = cellDate < new Date(today.getFullYear(), today.getMonth(), today.getDate());
      if (isPast) {
        cell.classList.add('past');
      } else {
        cell.onclick = () => selectDay(d, cellDate);
      }
      if (selectedDate && cellDate.toDateString() === selectedDate.toDateString()) {
        cell.classList.add('selected');
      }
      grid.appendChild(cell);
    }
  }

  function selectDay(d, date) {
    selectedDate = date;
    selectedTime = null;
    renderCalendar();
    const ts = document.getElementById('timeSection');
    ts.style.display = 'block';
    const tg = document.getElementById('timeGrid');
    tg.innerHTML = '';
    times.forEach(t => {
      const b = document.createElement('button');
      b.className = 'time-btn';
      b.textContent = t;
      b.onclick = () => selectTime(t, b);
      tg.appendChild(b);
    });
    updateConfirm();
  }

  function selectTime(t, el) {
    selectedTime = t;
    document.querySelectorAll('.time-btn').forEach(b => b.classList.remove('selected'));
    el.classList.add('selected');
    updateConfirm();
  }

  function updateConfirm() {
    const btn = document.getElementById('confirmBtn');
    if (selectedDate && selectedTime) {
      btn.classList.add('ready');
    } else {
      btn.classList.remove('ready');
    }
  }

  function changeMonth(dir) {
    currentMonth += dir;
    if (currentMonth > 11) { currentMonth = 0; currentYear++; }
    if (currentMonth < 0) { currentMonth = 11; currentYear--; }
    renderCalendar();
  }

  function goToSuccess() {
    const d = selectedDate;
    const dayNames = ["domingo","lunes","martes","miércoles","jueves","viernes","sábado"];
    const label = dayNames[d.getDay()] + ' ' + d.getDate() + ' de ' + months[d.getMonth()] + ' de ' + d.getFullYear();
    document.getElementById('chosenInfo').innerHTML = '📅 <strong>' + label + '</strong><br>🕐 <strong>' + selectedTime + '</strong>';
    document.getElementById('screen2').classList.remove('active');
    document.getElementById('screen3').classList.add('active');
  }
</script>
</body>
</html>
